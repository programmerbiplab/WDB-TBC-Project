{% extends "base.html" %}

{% block title %}Bad Request - World Hotels{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container">
        <div class="error-content">
            <h1 class="error-code">400</h1>
            <h2>Bad Request</h2>
            <p>The request could not be understood or was missing required parameters.</p>
            <div class="error-actions">
                <a href="javascript:history.back()" class="btn-secondary">Go Back</a>
                <a href="/" class="btn-primary">Go to Homepage</a>
            </div>
        </div>
    </div>
</section>

<style>
.error-section {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: var(--spacing-xl) 0;
}

.error-code {
    font-size: 8rem;
    color: var(--warning);
    margin: 0;
    font-weight: 700;
}

.error-content h2 {
    font-size: 2rem;
    margin: 1rem 0;
    color: var(--text-dark);
}

.error-content p {
    color: var(--text-light);
    margin-bottom: 2rem;
    font-size: 1.125rem;
}

.error-actions {
    display: flex;
    gap: 1rem;
    justify-content: center;
}
</style>
{% endblock %}
