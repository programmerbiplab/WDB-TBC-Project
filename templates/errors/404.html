{% extends "base.html" %}

{% block title %}Page Not Found - World Hotels{% endblock %}

{% block content %}
<section class="error-section">
    <div class="container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2>Page Not Found</h2>
            <p>Sorry, the page you're looking for doesn't exist.</p>
            <a href="/" class="btn-primary">Go to Homepage</a>
        </div>
    </div>
</section>

<style>
.error-section {
    min-height: 60vh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.error-code {
    font-size: 8rem;
    color: var(--primary-color);
    margin: 0;
}

.error-content h2 {
    font-size: 2rem;
    margin: 1rem 0;
}

.error-content p {
    color: var(--text-light);
    margin-bottom: 2rem;
}
</style>
{% endblock %}
